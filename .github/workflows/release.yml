name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  verify:
    uses: ./.github/workflows/ci.yml

  images:
    name: Publish ${{ matrix.name }} image
    needs: verify
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: java
            context: java/platform
            dockerfile: deploy/docker/Dockerfile.java
          - name: python
            context: python
            dockerfile: deploy/docker/Dockerfile.python
          - name: frontend
            context: frontend
            dockerfile: deploy/docker/Dockerfile.frontend
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Normalize image name
        id: image
        shell: bash
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}/${{ matrix.name }}" >> "$GITHUB_OUTPUT"
      - name: Build and publish
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.image.outputs.name }}:${{ github.ref_name }}
          provenance: true
          sbom: true

  release:
    name: Create GitHub Release
    needs: images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${GITHUB_REF_NAME}" --verify-tag --generate-notes --title "OpenEIP ${GITHUB_REF_NAME}"
