name: CI

on:
  workflow_call:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  java:
    name: Java Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: java/platform
    steps:
      - uses: actions/checkout@v7
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle
      - name: Prepare Gradle Wrapper
        run: chmod +x gradlew
      - name: Build, test, and verify
        run: ./gradlew --no-daemon clean check build
      - name: Compile Spike Java clients
        working-directory: .
        run: |
          java/platform/gradlew --no-daemon -p spike/spike-001-grpc-java-python spotlessCheck compileJava
          java/platform/gradlew --no-daemon -p spike/spike-002-kafka-eventing spotlessCheck compileJava

  python:
    name: Python Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v7
      - name: Set up Python 3.12
        uses: actions/setup-python@v7
        with:
          python-version: '3.12'
          cache: pip
      - name: Install dependencies
        run: |
          pip install -r requirements-dev.lock
          pip install --no-deps -e .
      - name: Ruff Lint
        run: ruff check .
      - name: Ruff Format
        run: ruff format --check .
      - name: Spike Python Lint
        working-directory: .
        run: ruff check --config python/pyproject.toml spike
      - name: Spike Python Format
        working-directory: .
        run: ruff format --check --config python/pyproject.toml spike
      - name: Mypy
        run: mypy engine-core/src
      - name: Unit Test
        run: pytest --cov-report=xml
      - name: Dependency Audit
        run: pip-audit -r requirements.lock

  frontend:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7
      - name: Set up Node.js 20
        uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Dependency Audit
        run: npm audit --audit-level=high
      - name: ESLint
        run: npm run lint
      - name: Prettier
        run: npm run format:check
      - name: Build
        run: npm run build

  docs:
    name: Documentation Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v7
      - name: Set up Node.js 20
        uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: website/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Dependency Audit
        run: npm audit --audit-level=high
      - name: Build
        run: npm run build

  foundation:
    name: Foundation Configuration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Validate Docker Compose
        run: docker compose config --quiet
      - name: Validate Spike Docker Compose
        run: |
          docker compose -f spike/spike-001-grpc-java-python/compose.yaml config --quiet
          docker compose -f spike/spike-002-kafka-eventing/compose.yaml config --quiet
          docker compose -f spike/spike-003-milvus-vector/compose.yaml config --quiet
          docker compose -f spike/spike-004-mcp-runtime/compose.yaml config --quiet
          docker compose -f spike/spike-005-llm-streaming/compose.yaml config --quiet
      - name: Validate Spike evidence
        run: python spike/validate_results.py

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Scan repository
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'
          skip-dirs: '**/node_modules,**/.venv,**/build,**/dist,**/.gradle'
