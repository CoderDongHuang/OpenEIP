name: openeip

services:
  gateway:
    image: nginxinc/nginx-unprivileged:1.30-alpine@sha256:44e36330f74d4f3a1d4e222acca9e23b401fb87811a7597024502bb759c4dd49
    ports:
      - "3000:8080"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      java:
        condition: service_healthy
      python:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - openeip

  java:
    build:
      context: ../../java/platform
      dockerfile: ../../deploy/docker/Dockerfile.java
      args:
        GRADLE_DISTRIBUTION_URL: ${GRADLE_DISTRIBUTION_URL:-https://services.gradle.org/distributions/gradle-8.14.5-bin.zip}
        MAVEN_REPOSITORY_URL: ${MAVEN_REPOSITORY_URL:-}
    environment:
      SERVER_PORT: "8080"
      DB_URL: jdbc:mysql://mysql:3306/openeip?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USERNAME: openeip
      DB_PASSWORD: local-openeip-password
      JWT_ALLOW_EPHEMERAL_KEY: "true"
      DOCUMENT_STORAGE_ROOT: /app/data/files
      KNOWLEDGE_INGESTION_PYTHON_URL: http://python:8000
      CHAT_PYTHON_URL: http://python:8000
      OPENEIP_INTERNAL_API_TOKEN: ${OPENEIP_INTERNAL_API_TOKEN:-local-openeip-internal-token}
    depends_on:
      mysql:
        condition: service_healthy
      python:
        condition: service_healthy
    expose:
      - "8080"
    volumes:
      - document-files:/app/data/files
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 20s
    networks:
      - openeip

  mysql:
    image: mysql:8.4.4@sha256:23818b7d7de427096ab1427b2e3d9d5e14a5b933f9a4431a482d6414bc879091
    environment:
      MYSQL_DATABASE: openeip
      MYSQL_USER: openeip
      MYSQL_PASSWORD: local-openeip-password
      MYSQL_ROOT_PASSWORD: local-root-password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-plocal-root-password"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - openeip

  python:
    build:
      context: ../../python
      dockerfile: ../deploy/docker/Dockerfile.python
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.org/simple}
    expose:
      - "8000"
    environment:
      OPENEIP_INTERNAL_API_TOKEN: ${OPENEIP_INTERNAL_API_TOKEN:-local-openeip-internal-token}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - openeip

  frontend:
    build:
      context: ../../frontend
      dockerfile: ../deploy/docker/Dockerfile.frontend
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      - openeip

networks:
  openeip:
    driver: bridge

volumes:
  mysql-data:
  document-files:
