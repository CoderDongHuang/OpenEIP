name: openeip

services:
  gateway:
    image: nginxinc/nginx-unprivileged:1.30-alpine@sha256:44e36330f74d4f3a1d4e222acca9e23b401fb87811a7597024502bb759c4dd49
    ports:
      - "3000:8080"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      java:
        condition: service_healthy
      python:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - openeip

  java:
    build:
      context: ../../java/platform
      dockerfile: ../../deploy/docker/Dockerfile.java
      args:
        GRADLE_DISTRIBUTION_URL: ${GRADLE_DISTRIBUTION_URL:-https://downloads.gradle.org/distributions/gradle-8.14.5-bin.zip}
        MAVEN_REPOSITORY_URL: ${MAVEN_REPOSITORY_URL:-}
    environment:
      SERVER_PORT: "8080"
      DB_URL: jdbc:mysql://mysql:3306/openeip?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USERNAME: openeip
      DB_PASSWORD: local-openeip-password
      JWT_ALLOW_EPHEMERAL_KEY: "true"
      DOCUMENT_STORAGE_ROOT: /app/data/files
      KNOWLEDGE_INGESTION_PYTHON_URL: http://python:8000
      CHAT_PYTHON_URL: http://python:8000
      OPENEIP_INTERNAL_API_TOKEN: ${OPENEIP_INTERNAL_API_TOKEN:-local-openeip-internal-token}
    depends_on:
      mysql:
        condition: service_healthy
      python:
        condition: service_healthy
    expose:
      - "8080"
    volumes:
      - document-files:/app/data/files
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 20s
    networks:
      - openeip

  mysql:
    image: openeip-mysql:8.4.10-hardened
    build:
      context: ../docker
      dockerfile: Dockerfile.mysql
      args:
        MYSQL_IMAGE: mysql:8.4.10@sha256:5700b0892591a760c4caef7a0024c887afd46317d73dd420801706e661c4db56
    environment:
      MYSQL_DATABASE: openeip
      MYSQL_USER: openeip
      MYSQL_PASSWORD: local-openeip-password
      MYSQL_ROOT_PASSWORD: local-root-password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-plocal-root-password"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - openeip

  python:
    build:
      context: ../../python
      dockerfile: ../deploy/docker/Dockerfile.python
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.org/simple}
    expose:
      - "8000"
    environment:
      OPENEIP_INTERNAL_API_TOKEN: ${OPENEIP_INTERNAL_API_TOKEN:-local-openeip-internal-token}
      OPENEIP_ENVIRONMENT: ${OPENEIP_ENVIRONMENT:-development}
      OPENEIP_EMBEDDING_PROVIDER: ${OPENEIP_EMBEDDING_PROVIDER:-deterministic}
      OPENEIP_EMBEDDING_REPOSITORY_BACKEND: ${OPENEIP_EMBEDDING_REPOSITORY_BACKEND:-milvus}
      OPENEIP_EMBEDDING_DIMENSION: ${OPENEIP_EMBEDDING_DIMENSION:-64}
      OPENEIP_OPENAI_API_KEY: ${OPENEIP_OPENAI_API_KEY:-}
      OPENEIP_MILVUS_URI: http://milvus:19530
      OPENEIP_ES_HOST: http://elasticsearch:9200
    depends_on:
      milvus:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - openeip

  etcd:
    image: quay.io/coreos/etcd:v3.5.18
    command: etcd --advertise-client-urls=http://etcd:2379 --listen-client-urls=http://0.0.0.0:2379 --data-dir=/etcd
    volumes:
      - etcd-data:/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - openeip

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: minio server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - openeip

  milvus:
    image: milvusdb/milvus:v2.6.0
    command: ["milvus", "run", "standalone"]
    ports:
      - "127.0.0.1:19530:19530"
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 10s
      timeout: 5s
      retries: 20
    volumes:
      - milvus-data:/var/lib/milvus
    networks:
      - openeip

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.19.0
    ports:
      - "127.0.0.1:19200:9200"
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9200/_cluster/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 20
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - openeip

  frontend:
    build:
      context: ../../frontend
      dockerfile: ../deploy/docker/Dockerfile.frontend
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      - openeip

networks:
  openeip:
    driver: bridge

volumes:
  mysql-data:
  document-files:
  etcd-data:
  minio-data:
  milvus-data:
  elasticsearch-data:
