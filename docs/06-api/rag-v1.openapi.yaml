openapi: 3.1.0
info:
  title: OpenEIP RAG API
  version: 1.0.0
paths:
  /api/v1/rag/queries:
    post:
      operationId: queryRag
      parameters:
        - { $ref: '#/components/parameters/InternalToken' }
        - { $ref: '#/components/parameters/TenantId' }
        - { $ref: '#/components/parameters/UserId' }
        - { $ref: '#/components/parameters/RequestId' }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [knowledgeBaseId, query]
              properties:
                knowledgeBaseId: { type: string, format: uuid }
                query: { type: string, minLength: 1, maxLength: 2000 }
                topK: { type: integer, minimum: 1, maximum: 20, default: 5 }
      responses:
        '200':
          description: Grounded answer or explicit no-context result
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RagEnvelope' }
        '400': { $ref: '#/components/responses/Error' }
        '401': { $ref: '#/components/responses/Error' }
        '413': { $ref: '#/components/responses/Error' }
        '415': { $ref: '#/components/responses/Error' }
        '503': { $ref: '#/components/responses/Error' }
components:
  parameters:
    InternalToken: { name: X-OpenEIP-Internal-Token, in: header, required: true, schema: { type: string } }
    TenantId: { name: X-Tenant-Id, in: header, required: true, schema: { type: string, format: uuid } }
    UserId: { name: X-User-Id, in: header, required: true, schema: { type: string, format: uuid } }
    RequestId: { name: X-Request-Id, in: header, required: true, schema: { type: string, maxLength: 128 } }
  schemas:
    Citation:
      type: object
      additionalProperties: false
      required: [documentId, chunkId, sourceSha256, score, excerpt, pages, startChar, endChar]
      properties:
        documentId: { type: string, format: uuid }
        chunkId: { type: string, pattern: '^chk_[a-f0-9]{32}$' }
        sourceSha256: { type: string, pattern: '^[a-f0-9]{64}$' }
        score: { type: number, minimum: -1, maximum: 1 }
        excerpt: { type: string, maxLength: 500 }
        pages:
          type: array
          maxItems: 100
          items: { type: integer, minimum: 1 }
        startChar: { type: integer, minimum: 0 }
        endChar: { type: integer, minimum: 1 }
    RagData:
      type: object
      additionalProperties: false
      required: [answer, model, modelVersion, citations, retrievalCount, durationMs]
      properties:
        answer: { type: string, maxLength: 8000 }
        model: { type: string }
        modelVersion: { type: string }
        citations: { type: array, maxItems: 20, items: { $ref: '#/components/schemas/Citation' } }
        retrievalCount: { type: integer, minimum: 0, maximum: 20 }
        durationMs: { type: number, minimum: 0 }
    RagEnvelope:
      type: object
      required: [code, message, data, requestId, timestamp]
      properties:
        code: { type: integer, const: 0 }
        message: { const: success }
        data: { $ref: '#/components/schemas/RagData' }
        requestId: { type: string }
        timestamp: { type: string, format: date-time }
  responses:
    Error:
      description: Stable error envelope without prompt, context, vector, token, or provider details
      content: { application/json: { schema: { type: object } } }
