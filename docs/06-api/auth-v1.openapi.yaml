openapi: 3.0.3
info:
  title: OpenEIP Auth API
  version: 1.0.0
  description: Authentication, refresh-token rotation, current identity, and RBAC administration.
servers:
  - url: /api/v1
tags:
  - name: Auth
  - name: RBAC
paths:
  /auth/register:
    post:
      tags: [Auth]
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserEnvelope'
        '400': { $ref: '#/components/responses/BadRequest' }
        '409': { $ref: '#/components/responses/Conflict' }
        '429': { $ref: '#/components/responses/RateLimited' }
  /auth/login:
    post:
      tags: [Auth]
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Token pair issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenEnvelope'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '429': { $ref: '#/components/responses/RateLimited' }
  /auth/refresh:
    post:
      tags: [Auth]
      operationId: refreshToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Refresh token consumed and replacement pair issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenEnvelope'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '429': { $ref: '#/components/responses/RateLimited' }
  /auth/me:
    get:
      tags: [Auth]
      operationId: getCurrentUser
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Current identity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserEnvelope'
        '401': { $ref: '#/components/responses/Unauthorized' }
  /auth/roles:
    get:
      tags: [RBAC]
      operationId: listRoles
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Roles and permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleListEnvelope'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [RBAC]
      operationId: createRole
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRoleRequest'
      responses:
        '201':
          description: Role created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleEnvelope'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }
  /auth/users/{id}/roles:
    put:
      tags: [RBAC]
      operationId: replaceUserRoles
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignRolesRequest'
      responses:
        '200':
          description: Updated user identity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserEnvelope'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  responses:
    BadRequest:
      description: Validation error
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    Unauthorized:
      description: Missing or invalid credentials
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    Forbidden:
      description: Insufficient permission
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    NotFound:
      description: User or role not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    Conflict:
      description: Unique resource conflict
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    RateLimited:
      description: Request rate exceeded
      headers:
        Retry-After:
          schema: { type: integer, minimum: 1 }
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
  schemas:
    RegisterRequest:
      type: object
      additionalProperties: false
      required: [username, email, password]
      properties:
        username: { type: string, minLength: 3, maxLength: 64, pattern: '^[A-Za-z0-9_.-]+$' }
        email: { type: string, format: email, maxLength: 255 }
        password: { type: string, format: password, minLength: 8, maxLength: 72 }
    LoginRequest:
      type: object
      additionalProperties: false
      required: [username, password]
      properties:
        username: { type: string, minLength: 1, maxLength: 64 }
        password: { type: string, format: password, minLength: 1, maxLength: 72 }
    RefreshRequest:
      type: object
      additionalProperties: false
      required: [refreshToken]
      properties:
        refreshToken: { type: string, minLength: 1, maxLength: 4096 }
    CreateRoleRequest:
      type: object
      additionalProperties: false
      required: [name, permissionCodes]
      properties:
        name: { type: string, pattern: '^ROLE_[A-Z0-9_]{2,59}$' }
        description: { type: string, maxLength: 255 }
        permissionCodes:
          type: array
          uniqueItems: true
          maxItems: 100
          items: { type: string, maxLength: 128 }
    AssignRolesRequest:
      type: object
      additionalProperties: false
      required: [roleNames]
      properties:
        roleNames:
          type: array
          minItems: 1
          uniqueItems: true
          maxItems: 20
          items: { type: string, pattern: '^ROLE_[A-Z0-9_]{2,59}$' }
    TokenPair:
      type: object
      required: [accessToken, refreshToken, expiresIn, tokenType]
      properties:
        accessToken: { type: string }
        refreshToken: { type: string }
        expiresIn: { type: integer, format: int64, example: 3600 }
        tokenType: { type: string, enum: [Bearer] }
    User:
      type: object
      required: [id, username, email, roles, permissions]
      properties:
        id: { type: string, format: uuid }
        username: { type: string }
        email: { type: string, format: email }
        roles:
          type: array
          uniqueItems: true
          items: { type: string }
        permissions:
          type: array
          uniqueItems: true
          items: { type: string }
    Role:
      type: object
      required: [id, name, permissions]
      properties:
        id: { type: string }
        name: { type: string }
        description: { type: string, nullable: true }
        permissions:
          type: array
          uniqueItems: true
          items: { type: string }
    ErrorEnvelope:
      type: object
      required: [code, message, requestId, timestamp]
      properties:
        code: { type: string, example: AUTH-E-003 }
        message: { type: string }
        data: { nullable: true }
        requestId: { type: string }
        timestamp: { type: string, format: date-time }
    TokenEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data: { $ref: '#/components/schemas/TokenPair' }
    UserEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data: { $ref: '#/components/schemas/User' }
    RoleEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data: { $ref: '#/components/schemas/Role' }
    RoleListEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              type: array
              items: { $ref: '#/components/schemas/Role' }
    SuccessEnvelope:
      type: object
      required: [code, message, data, requestId, timestamp]
      properties:
        code: { type: integer, enum: [0] }
        message: { type: string, enum: [success] }
        data: {}
        requestId: { type: string }
        timestamp: { type: string, format: date-time }
