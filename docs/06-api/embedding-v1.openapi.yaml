openapi: 3.1.0
info:
  title: OpenEIP Embedding API
  version: 1.0.0
  description: Bounded internal batch embedding and vector upsert for the v0.2 RAG closure.
paths:
  /api/v1/embedding/batches:
    post:
      operationId: embedBatch
      parameters:
        - { $ref: '#/components/parameters/InternalToken' }
        - { $ref: '#/components/parameters/TenantId' }
        - { $ref: '#/components/parameters/UserId' }
        - { $ref: '#/components/parameters/RequestId' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/EmbeddingBatchRequest' }
      responses:
        '200':
          description: Deterministic replay or newly persisted vectors
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EmbeddingEnvelope' }
        '400': { $ref: '#/components/responses/Error' }
        '401': { $ref: '#/components/responses/Error' }
        '409': { $ref: '#/components/responses/Error' }
        '413': { $ref: '#/components/responses/Error' }
        '503': { $ref: '#/components/responses/Error' }
components:
  parameters:
    InternalToken: { name: X-OpenEIP-Internal-Token, in: header, required: true, schema: { type: string } }
    TenantId: { name: X-Tenant-Id, in: header, required: true, schema: { type: string, format: uuid } }
    UserId: { name: X-User-Id, in: header, required: true, schema: { type: string, format: uuid } }
    RequestId: { name: X-Request-Id, in: header, required: true, schema: { type: string, maxLength: 128 } }
  schemas:
    EmbeddingBatchRequest:
      type: object
      additionalProperties: false
      required: [jobId, knowledgeBaseId, documentId, chunks]
      properties:
        jobId: { type: string, format: uuid }
        knowledgeBaseId: { type: string, format: uuid }
        documentId: { type: string, format: uuid }
        chunks:
          type: array
          minItems: 1
          maxItems: 32
          items:
            type: object
            additionalProperties: false
            required: [chunkId, text, sourceSha256]
            properties:
              chunkId: { type: string, minLength: 5, maxLength: 64, pattern: '^chk_[a-f0-9]{32}$' }
              text: { type: string, minLength: 1, maxLength: 8192 }
              sourceSha256: { type: string, pattern: '^[a-f0-9]{64}$' }
    EmbeddingData:
      type: object
      additionalProperties: false
      required: [jobId, knowledgeBaseId, documentId, model, modelVersion, dimension, vectorCount, replayed, vectors]
      properties:
        jobId: { type: string, format: uuid }
        knowledgeBaseId: { type: string, format: uuid }
        documentId: { type: string, format: uuid }
        model: { type: string }
        modelVersion: { type: string }
        dimension: { type: integer, minimum: 8, maximum: 1536 }
        vectorCount: { type: integer, minimum: 1, maximum: 32 }
        replayed: { type: boolean }
        vectors:
          type: array
          maxItems: 32
          items:
            type: object
            required: [chunkId, vector]
            properties:
              chunkId: { type: string }
              vector: { type: array, items: { type: number } }
    EmbeddingEnvelope:
      type: object
      required: [code, message, data, requestId, timestamp]
      properties:
        code: { type: integer, const: 0 }
        message: { const: success }
        data: { $ref: '#/components/schemas/EmbeddingData' }
        requestId: { type: string }
        timestamp: { type: string, format: date-time }
  responses:
    Error:
      description: Standard error envelope without text, vector, or provider details
      content:
        application/json:
          schema: { type: object }
