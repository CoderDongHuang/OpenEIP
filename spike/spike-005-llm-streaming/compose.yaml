name: openeip-spike-005

services:
  upstream:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: uvicorn python-backend.upstream_fixture:app --host 0.0.0.0 --port 8001
    networks: [spike]

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      OPENAI_BASE_URL: http://upstream:8001/v1
      OPENAI_API_KEY: local-spike-key
    depends_on:
      - upstream
    networks: [spike]

  gateway:
    image: nginx:1.27.4-alpine
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/streaming-demo.html:/usr/share/nginx/html/index.html:ro
    depends_on:
      - backend
    networks: [spike]

  browser-test:
    build:
      context: .
      dockerfile: Dockerfile.browser
    depends_on:
      - gateway
    networks: [spike]

networks:
  spike:
