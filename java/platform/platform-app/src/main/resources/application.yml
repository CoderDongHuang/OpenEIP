server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: platform-app
  jackson:
    deserialization:
      fail-on-unknown-properties: true
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: ${DOCUMENT_MAX_FILE_SIZE:10MB}
      max-request-size: ${DOCUMENT_MAX_REQUEST_SIZE:11MB}

openeip:
  jwt:
    private-key-base64: ${JWT_PRIVATE_KEY_BASE64:}
    public-key-base64: ${JWT_PUBLIC_KEY_BASE64:}
    allow-ephemeral-key: ${JWT_ALLOW_EPHEMERAL_KEY:false}
    access-expiration: 3600
    refresh-expiration: 604800
  auth:
    rate-limit:
      requests: ${AUTH_RATE_LIMIT_REQUESTS:20}
      window-seconds: ${AUTH_RATE_LIMIT_WINDOW_SECONDS:60}
      max-keys: ${AUTH_RATE_LIMIT_MAX_KEYS:10000}
  document:
    storage-root: ${DOCUMENT_STORAGE_ROOT:./data/files}
    max-size-bytes: ${DOCUMENT_MAX_SIZE_BYTES:10485760}
  knowledge:
    ingestion:
      python-url: ${KNOWLEDGE_INGESTION_PYTHON_URL:http://python:8000}
      internal-token: ${OPENEIP_INTERNAL_API_TOKEN:}
      external-tenant-id: ${KNOWLEDGE_EXTERNAL_TENANT_ID:11111111-1111-4111-8111-111111111111}
    kafka:
      enabled: ${KNOWLEDGE_KAFKA_ENABLED:false}
      external-tenant-id: ${KNOWLEDGE_EXTERNAL_TENANT_ID:11111111-1111-4111-8111-111111111111}
      parsed-topic: ${KNOWLEDGE_PARSED_TOPIC:document.lifecycle.parsed.v1}
      embedding-topic: ${KNOWLEDGE_EMBEDDING_TOPIC:embedding.job.completed.v1}
      group-id: ${KNOWLEDGE_KAFKA_GROUP_ID:openeip-knowledge-v1}
  chat:
    python-url: ${CHAT_PYTHON_URL:http://python:8000}
    internal-token: ${OPENEIP_INTERNAL_API_TOKEN:}
    external-tenant-id: ${CHAT_EXTERNAL_TENANT_ID:11111111-1111-4111-8111-111111111111}
  agent:
    python-url: ${AGENT_PYTHON_URL:http://python:8000}
    internal-token: ${OPENEIP_INTERNAL_API_TOKEN:}
    external-tenant-id: ${AGENT_EXTERNAL_TENANT_ID:11111111-1111-4111-8111-111111111111}

logging:
  level:
    com.openeip: INFO
    org.springframework.security: WARN

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
